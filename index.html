<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vortex Steakhouse</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

* {margin:0;padding:0;box-sizing:border-box;}

body {
background:#0a0a0a;
color:#fff;
font-family:Inter;
}

/* HEADER */
header {
position:fixed;
width:100%;
padding:20px 5%;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo {
color:#d4af37;
font-family:'Playfair Display';
letter-spacing:3px;
}

nav a {
color:#aaa;
margin-left:20px;
text-decoration:none;
font-size:12px;
}

nav a:hover {color:#d4af37;}

/* HERO */
.hero {
height:100vh;
background:url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1 {
font-size:60px;
font-family:'Playfair Display';
}

.hero p {
color:#ccc;
margin:20px 0;
}

.btn {
border:1px solid #d4af37;
padding:15px 40px;
color:#d4af37;
text-decoration:none;
}

.btn:hover {
background:#d4af37;
color:black;
}

/* CATALOGO */
.catalogo {
padding:100px 5%;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card {
background:#111;
border:1px solid rgba(212,175,55,0.1);
}

.card img {
width:100%;
height:200px;
object-fit:cover;
}

.card h3 {padding:10px;}

.preco {
padding:10px;
color:#d4af37;
}

.card a {
display:block;
padding:10px;
text-align:center;
color:#d4af37;
text-decoration:none;
}

/* WHATS */
.whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50px;
color:#fff;
text-decoration:none;
}

/* FOOTER */
footer {
text-align:center;
padding:40px;
color:#666;
}

</style>
</head>

<body>

<header>
<div class="logo">VORTEX</div>
<nav>
<a href="#">Início</a>
<a href="#catalogo">Cortes</a>
</nav>
</header>

<section class="hero">
<h1>A ARTE DA CARNE</h1>
<p>Cortes nobres • Experiência premium</p>
<a href="#catalogo" class="btn">VER CORTES</a>
</section>

<section id="catalogo" class="catalogo">

<h2 style="text-align:center;color:#d4af37;margin-bottom:40px;">CORTES PREMIUM</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
<h3>Wagyu A5</h3>
<span class="preco">Sob consulta</span>
<a href="https://wa.me/5511999999999?text=Quero Wagyu">Comprar</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551183053-bf91a1d81141">
<h3>Tomahawk</h3>
<span class="preco">R$ 189,90/kg</span>
<a href="https://wa.me/5511999999999?text=Quero Tomahawk">Comprar</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1617196038433-0c4c64a7b8e6">
<h3>Bife Ancho</h3>
<span class="preco">R$ 109,90/kg</span>
<a href="https://wa.me/5511999999999?text=Quero Ancho">Comprar</a>
</div>

</div>

</section>

<footer>
© 2026 Vortex Steakhouse
</footer>

<a href="https://wa.me/5511999999999" class="whatsapp">WhatsApp</a>

</body>
</html>
