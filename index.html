<section class="hero">
    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="hero-content">
        <span class="tag">EXPERIÊNCIA PREMIUM</span>

        <h1>
            A ARTE<br>
            <span>DA CARNE</span>
        </h1>

        <p>Exclusividade • Qualidade • Experiência</p>

        <a href="#produtos" class="cta">VER CATÁLOGO</a>
    </div>
</section>

<style>
.hero{
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* BACKGROUND COM PARALLAX */
.bg{
    position:absolute;
    width:110%;
    height:110%;
    background:url('https://images.unsplash.com/photo-1603048297172-c92544798d5a') center/cover no-repeat;
    transform:scale(1.1);
    transition:transform 0.2s ease-out;
}

/* OVERLAY CINEMATOGRÁFICO */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.95));
}

/* CONTEÚDO */
.hero-content{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.tag{
    letter-spacing:4px;
    font-size:0.7rem;
    color:#888;
}

.hero h1{
    font-family:'Marcellus', serif;
    font-size:5rem;
    letter-spacing:6px;
}

.hero h1 span{
    color:#c7a15a;
}

/* BOTÃO */
.cta{
    margin-top:30px;
    padding:15px 50px;
    border:1px solid #c7a15a;
    color:#c7a15a;
    text-decoration:none;
    letter-spacing:2px;
    transition:.4s;
    position:relative;
}

.cta::after{
    content:'';
    position:absolute;
    width:0;
    height:100%;
    left:0;
    top:0;
    background:#c7a15a;
    transition:.4s;
    z-index:-1;
}

.cta:hover::after{width:100%;}
.cta:hover{color:#000;}

/* EFEITO DE LUZ DINÂMICO */
.hero::before{
    content:'';
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle, rgba(199,161,90,0.2), transparent);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
}
</style>

<script>
const bg = document.querySelector('.bg');

document.addEventListener('mousemove', (e)=>{
    let x = (e.clientX / window.innerWidth - 0.5) * 20;
    let y = (e.clientY / window.innerHeight - 0.5) * 20;

    bg.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
});
</script>
